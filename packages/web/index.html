<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MathMeander</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        font-family: ui-sans-serif, system-ui, sans-serif;
        max-width: 48rem;
        margin: 2rem auto;
        padding: 0 1rem;
        line-height: 1.5;
      }
      pre {
        white-space: pre-wrap;
        word-break: break-word;
        background: rgba(127, 127, 127, 0.08);
        padding: 0.75rem;
        border-radius: 6px;
      }
      input,
      textarea,
      button {
        font: inherit;
        padding: 0.4rem 0.6rem;
      }
      textarea {
        width: 100%;
        min-height: 12rem;
      }
      nav {
        display: flex;
        gap: 1rem;
        margin-bottom: 1.5rem;
      }
      .meta {
        color: gray;
        font-size: 0.85rem;
      }
      .error {
        color: crimson;
      }
      ul.notes {
        list-style: none;
        padding: 0;
      }
      ul.notes li {
        padding: 0.4rem 0;
        border-bottom: 1px solid rgba(127, 127, 127, 0.2);
      }
      /* The journal-day editor (slice 2c-1). The .ProseMirror node is the contenteditable surface. */
      .day-editor .ProseMirror {
        outline: none;
        min-height: 8rem;
        /* Extra LEFT padding = a gutter for margin affordances (the fold chevron; the hover block handle),
           so they sit to the LEFT of the text instead of eating into it. */
        padding: 0.75rem 0.75rem 0.75rem 2.2rem;
        border: 1px solid rgba(127, 127, 127, 0.25);
        border-radius: 6px;
        /* ProseMirror requires this — without it the browser collapses trailing spaces, which breaks
           the text-input fast path (e.g. a cue input rule typed right after a space). */
        white-space: pre-wrap;
      }
      .day-editor .ProseMirror p {
        margin: 0 0 0.6rem;
        border-radius: 4px;
        transition: box-shadow 0.12s ease;
        /* Positioning context for the margin affordances (fold chevron, block handle) that sit in the gutter. */
        position: relative;
      }
      /* Reveal a unit's boundary only when you're working in it (hover, or the caret is inside — the
         `unit-active` decoration): a quiet left gutter, so plain prose reads clean at rest while the
         paragraph = unit structure stays legible on interaction (the chosen "reveal on focus/hover"). */
      .day-editor .ProseMirror p:hover,
      .day-editor .ProseMirror p.unit-active {
        box-shadow: inset 3px 0 0 rgba(125, 125, 165, 0.4);
      }
      .day-editor code.math {
        background: rgba(127, 127, 127, 0.12);
        padding: 0 0.2rem;
        border-radius: 3px;
      }
      /* Type cues (slice 2c-2): a typed prose block reads as a light, distinct callout — a subtle tint +
         rounded corner + an uppercase type label — not a quote bar and not a heavy box (§9.y "light
         affordances, not boxes"). The label is position:absolute (out of the text flow) so clicking the
         text lands at offset 0 (the Backspace-clear gesture stays reliable). */
      .day-editor .ProseMirror p[data-unit-type] {
        position: relative;
        background: rgba(125, 125, 165, 0.08);
        border-radius: 8px;
        padding: 1.5rem 0.85rem 0.65rem;
        margin: 0.7rem 0;
      }
      /* §6.3b TITLE BAR (typeTitle widget) — replaces the old `::before` label. An out-of-band widget in the
         reserved top row: the label + computed number, then the authored name(s). Double-click → edit. */
      .day-editor .mm-title {
        position: absolute;
        top: 0.4rem;
        left: 0.85rem;
        right: 0.85rem;
        display: flex;
        align-items: baseline;
        gap: 0.5em;
        user-select: none;
        cursor: text;
        line-height: 1;
      }
      .day-editor .mm-title-label {
        font-size: 0.62rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        color: rgba(110, 110, 150, 0.95);
        white-space: nowrap;
      }
      /* The designation text is pseudo-content so it holds NO in-band text (clean block textContent/copy —
         never "Theorem 1The statement…"); blockHandle's ⋮⋮ uses the same trick. */
      .day-editor .mm-title-label::before {
        content: attr(data-label);
      }
      .day-editor .mm-title-names {
        font-size: 0.86rem;
        font-weight: 600;
        font-style: italic;
        color: rgba(60, 60, 90, 0.92);
      }
      /* Double-click a name → it becomes an inline input IN PLACE (no popover). A single name = one field;
         ＋ adds an alias inline, ✕ removes. Minimal + modern; the bar just grows as aliases are added. */
      .day-editor .mm-title-name {
        cursor: text;
      }
      .day-editor .mm-title-chip {
        display: inline-flex;
        align-items: center;
        gap: 0.1em;
      }
      /* The input is styled IDENTICALLY to the displayed name (.mm-title-names: 0.86rem italic 600, same
         color) with NO box — so double-click only reveals a caret + the ✕/＋, the name text never jumps. */
      .day-editor .mm-title-input {
        font: inherit;
        font-size: 0.86rem;
        font-style: italic;
        font-weight: 600;
        color: rgba(60, 60, 90, 0.92);
        padding: 0;
        margin: 0;
        border: none;
        background: transparent;
        outline: none;
      }
      .day-editor .mm-title-input:focus {
        /* a whisper of an editing cue — a faint underline, never a filled box */
        border-bottom: 1px dotted rgba(125, 125, 165, 0.55);
      }
      .day-editor .mm-title-rm,
      .day-editor .mm-title-add {
        font: inherit;
        font-size: 0.72rem;
        line-height: 1;
        background: none;
        border: none;
        color: rgba(110, 110, 150, 0.7);
        cursor: pointer;
        padding: 0 0.15rem;
        border-radius: 4px;
      }
      /* ✕ stays out of the way for a single name — appears when you hover the chip; ＋ is always subtly there. */
      .day-editor .mm-title-rm {
        opacity: 0;
        transition: opacity 0.1s ease;
      }
      .day-editor .mm-title-chip:hover .mm-title-rm,
      .day-editor .mm-title-input:focus + .mm-title-rm {
        opacity: 1;
      }
      .day-editor .mm-title-rm:hover,
      .day-editor .mm-title-add:hover {
        background: rgba(125, 125, 165, 0.14);
        color: rgba(110, 110, 150, 1);
      }
      /* A typed unit is a multi-paragraph container; when the caret is inside, hint how to leave it (the
         other exit is a 2nd consecutive blank line). pointer-events:none so it never eats a click. */
      .day-editor .ProseMirror p[data-unit-type].unit-active::after {
        content: '⌘↵ to finish';
        position: absolute;
        top: 0.45rem;
        right: 0.85rem;
        font-size: 0.6rem;
        color: rgba(110, 110, 150, 0.7);
        pointer-events: none;
      }
      /* Math (slice 2d) — editable-syntax live preview. Inline math is the LITERAL `$…$` source text carrying
         the `mathExpr` mark (`.math-src`). The mathLivePreview plugin RENDERS it with KaTeX (a `.math-render`
         widget) while the caret is outside the span, and HIDES the raw text (`.math-hidden`); the moment the
         caret touches the span the decorations drop and the raw `$…$` shows for editing. */
      .day-editor .math-src {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.9em;
        color: rgba(90, 90, 150, 0.95);
      }
      .day-editor .math-hidden {
        display: none;
      }
      /* Inline formatting (`**bold**`/`*italic*`/`~~strike~~`/`` `code` ``): markRecognize styles the inner;
         markLivePreview HIDES the wrapping delimiters while the caret is outside the region, revealing them
         (this class drops) the moment the selection touches it — the same hide-on-blur/reveal-on-caret model
         as math, so the delimiters are never consumed yet stay out of the way while reading. */
      .day-editor .mark-delim-hidden {
        display: none;
      }
      /* §B section headings (Obsidian-style): the title block renders bold/larger (.mm-heading), and its
         leading `#`×n + space SOURCE prefix is KEPT as editable text — HIDDEN when the caret is away from the
         heading (.heading-prefix-hidden) and shown DIMMED when the caret is in the heading line
         (.heading-prefix-dimmed) — the same kept-source/hide-reveal model as `$…$` and `**…**`, so the `#`s
         are never consumed yet stay out of the way while reading. */
      .day-editor .mm-heading {
        font-weight: 650;
        font-size: 1.25em;
        line-height: 1.3;
        margin: 0.4em 0 0.1em;
      }
      .day-editor .heading-prefix-hidden {
        display: none;
      }
      .day-editor .heading-prefix-dimmed {
        opacity: 0.35;
        font-weight: 400;
      }
      /* §B section folding (slice 3c): a chevron widget (▸ folded / ▾ expanded) sits before each foldable
         heading; folding hides the heading's descendant blocks. View-only — fold state never touches the
         canonical content. */
      .day-editor .mm-fold-toggle {
        /* Strictly in the LEFT GUTTER (absolute, into the editor's left padding) — never eats title width. */
        position: absolute;
        left: -1rem;
        cursor: pointer;
        user-select: none;
        color: rgba(110, 110, 150, 0.7);
        font-size: 0.8em;
        /* Quiet at rest: an UNFOLDED section's chevron appears only on hover (rule below); a FOLDED one is
           always shown (.is-folded below) so the collapsed state is discoverable without hovering. */
        opacity: 0;
        transition: opacity 0.1s ease;
      }
      .day-editor .ProseMirror p:hover .mm-fold-toggle {
        opacity: 1;
      }
      .day-editor .mm-fold-toggle.is-folded {
        opacity: 1;
      }
      /* Notion-style per-block handle: a ⋮⋮ grip in the gutter, revealed on hover. Click → the Move up /
         Move down menu. It is a SINGLE hover-tracked overlay in <body> (position: fixed, JS-positioned by
         blockHandle.ts) — NOT a per-block widget in the content — so it never sits at a block-start caret
         position (which scrambled block-opening math; see blockHandle.ts / PM issue #1061). */
      .mm-block-handle {
        position: fixed;
        z-index: 40;
        cursor: grab;
        user-select: none;
        color: rgba(110, 110, 150, 0.55);
        font-size: 0.85em;
        line-height: 1.2;
        padding: 0 0.15rem; /* a wider hover target that bridges the block↔handle gutter gap */
      }
      .mm-block-handle:hover {
        color: rgba(110, 110, 150, 0.9);
      }
      .mm-block-menu {
        position: absolute;
        z-index: 50;
        background: #fff;
        border: 1px solid rgba(127, 127, 127, 0.3);
        border-radius: 6px;
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.12);
        padding: 0.25rem;
        display: flex;
        flex-direction: column;
        min-width: 8rem;
      }
      .mm-block-menu button {
        text-align: left;
        background: none;
        border: none;
        padding: 0.35rem 0.6rem;
        border-radius: 4px;
        cursor: pointer;
        font: inherit;
        color: inherit;
      }
      .mm-block-menu button:hover {
        background: rgba(125, 125, 165, 0.15);
      }
      .day-editor .ProseMirror p.mm-folded-hidden {
        display: none;
      }
      .day-editor .math-render {
        cursor: pointer;
        padding: 0 0.05rem;
      }
      /* Display math (structured-math increment 1): a whole-line `$$…$$` renders as a CENTERED block (KaTeX
         displayMode) that is ALWAYS visible; clicking it reveals the `$$…$$` source ABOVE it for editing (the
         `.math-src-display` line), which collapses again on blur. The render hugs the surrounding content (no
         spurious blank line); the page reflows when the source line appears/collapses. */
      .day-editor .math-render-display {
        display: block;
        text-align: center;
        margin: 0.5rem 0;
        cursor: pointer;
      }
      .day-editor .math-src-display {
        display: block;
      }
      .day-editor .math-invalid {
        color: #b00020;
        border-bottom: 1px dotted #b00020;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.9em;
      }
      /* Partially-parsed math DOES render (bad fragments shown verbatim by the transpiler); a quiet amber
         underline signals the partial failure — deliberately softer than the red `math-invalid`. */
      .day-editor .math-partial {
        border-bottom: 1px dotted #b8860b;
      }
      /* Read-only math-row containers (slice 2-A): `equations` (co-equal system) and `derivation`
         (sequential chain). Each row is [relation gutter | body]; styling is deliberately minimal
         (slice-2 defers polish) — true column alignment at the relation is the 2-B `aligned` upgrade. */
      .equations,
      .derivation {
        margin: 0.5rem 0;
      }
      .equations .row,
      .derivation .row {
        display: grid;
        grid-template-columns: 1.5rem 1fr;
        align-items: baseline;
        column-gap: 0.25rem;
      }
      /* Each row renders in KaTeX displayMode (correct large-operator sizing), whose default
         `.katex-display { margin: 1em 0 }` stacks into big gaps between rows — replace it with a tight,
         uniform rhythm so a system reads as one block. */
      .equations .katex-display,
      .derivation .katex-display {
        margin: 0.15rem 0;
      }
      .equations .row-relation,
      .derivation .row-relation {
        text-align: right;
        color: rgba(110, 110, 150, 0.85);
      }
      .case-split .case-label {
        font-style: italic;
        color: rgba(110, 110, 150, 0.85);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
