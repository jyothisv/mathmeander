<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MathMeander</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        font-family: ui-sans-serif, system-ui, sans-serif;
        max-width: 48rem;
        margin: 2rem auto;
        padding: 0 1rem;
        line-height: 1.5;
      }
      pre {
        white-space: pre-wrap;
        word-break: break-word;
        background: rgba(127, 127, 127, 0.08);
        padding: 0.75rem;
        border-radius: 6px;
      }
      input,
      textarea,
      button {
        font: inherit;
        padding: 0.4rem 0.6rem;
      }
      textarea {
        width: 100%;
        min-height: 12rem;
      }
      nav {
        display: flex;
        gap: 1rem;
        margin-bottom: 1.5rem;
      }
      .meta {
        color: gray;
        font-size: 0.85rem;
      }
      .error {
        color: crimson;
      }
      ul.notes {
        list-style: none;
        padding: 0;
      }
      ul.notes li {
        padding: 0.4rem 0;
        border-bottom: 1px solid rgba(127, 127, 127, 0.2);
      }
      /* The journal-day editor (slice 2c-1). The .ProseMirror node is the contenteditable surface. */
      .day-editor .ProseMirror {
        outline: none;
        min-height: 8rem;
        padding: 0.75rem;
        border: 1px solid rgba(127, 127, 127, 0.25);
        border-radius: 6px;
        /* ProseMirror requires this — without it the browser collapses trailing spaces, which breaks
           the text-input fast path (e.g. an input rule like `$`→math typed right after a space). */
        white-space: pre-wrap;
      }
      .day-editor .ProseMirror p {
        margin: 0 0 0.6rem;
        border-radius: 4px;
        transition: box-shadow 0.12s ease;
      }
      /* Reveal a unit's boundary only when you're working in it (hover, or the caret is inside — the
         `unit-active` decoration): a quiet left gutter, so plain prose reads clean at rest while the
         paragraph = unit structure stays legible on interaction (the chosen "reveal on focus/hover"). */
      .day-editor .ProseMirror p:hover,
      .day-editor .ProseMirror p.unit-active {
        box-shadow: inset 3px 0 0 rgba(125, 125, 165, 0.4);
      }
      .day-editor code.math {
        background: rgba(127, 127, 127, 0.12);
        padding: 0 0.2rem;
        border-radius: 3px;
      }
      /* Type cues (slice 2c-2): a typed prose block reads as a light, distinct callout — a subtle tint +
         rounded corner + an uppercase type label — not a quote bar and not a heavy box (§9.y "light
         affordances, not boxes"). The label is position:absolute (out of the text flow) so clicking the
         text lands at offset 0 (the Backspace-clear gesture stays reliable). */
      .day-editor .ProseMirror p[data-unit-type] {
        position: relative;
        background: rgba(125, 125, 165, 0.08);
        border-radius: 8px;
        padding: 1.5rem 0.85rem 0.65rem;
        margin: 0.7rem 0;
      }
      .day-editor .ProseMirror p[data-unit-type]::before {
        content: attr(data-unit-type);
        position: absolute;
        top: 0.45rem;
        left: 0.85rem;
        font-size: 0.62rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        color: rgba(110, 110, 150, 0.95);
      }
      /* A typed unit is a multi-paragraph container; when the caret is inside, hint how to leave it (the
         other exit is a 2nd consecutive blank line). pointer-events:none so it never eats a click. */
      .day-editor .ProseMirror p[data-unit-type].unit-active::after {
        content: '⌘↵ to finish';
        position: absolute;
        top: 0.45rem;
        right: 0.85rem;
        font-size: 0.6rem;
        color: rgba(110, 110, 150, 0.7);
        pointer-events: none;
      }
      /* Math (slice 2d) — Obsidian-style live preview. RENDERED by default; the SOURCE is revealed inline,
         in the prose flow, ONLY while the caret is inside (the `math-open` class, from the mathOpen
         decoration). The switch is purely a CSS visibility flip, so source↔render is seamless. */
      .day-editor .inline-math {
        cursor: pointer;
      }
      .day-editor .inline-math .math-source {
        display: none; /* hidden at rest — present so PM can manage the source text, revealed when open */
      }
      .day-editor .inline-math .math-render {
        padding: 0 0.05rem;
      }
      .day-editor .inline-math.math-open {
        cursor: text;
      }
      .day-editor .inline-math.math-open .math-render {
        display: none;
      }
      .day-editor .inline-math.math-open .math-source {
        /* inline-block + a min width gives the (possibly EMPTY) source span layout, so the browser can hold
           the caret inside it — without this an empty `$`-just-created node can't be typed into. */
        display: inline-block;
        min-width: 0.6ch;
        vertical-align: baseline;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.9em;
        background: rgba(125, 125, 165, 0.1);
        border-radius: 3px;
        padding: 0 0.15rem; /* no vertical padding — keep the caret level with the `$` delimiters */
        white-space: pre;
      }
      /* Give the (possibly EMPTY) inline-block a TEXT line, so it aligns by the text baseline rather than its
         bottom edge — otherwise the caret in an empty source sits below the inline `$` spans. The ZWSP is
         invisible, zero-width, and (being a pseudo-element) is not part of node.textContent. */
      .day-editor .inline-math.math-open .math-source::before {
        content: '\200B';
      }
      /* The `$…$` delimiters are sibling spans (the NodeView renders them), shown only while editing the
         source so it reads as math mode — the caret sits in the source BETWEEN them. */
      .day-editor .inline-math .math-delim {
        display: none;
      }
      .day-editor .inline-math.math-open .math-delim {
        display: inline;
        opacity: 0.5;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.9em;
      }
      .day-editor .inline-math.math-selected .math-render {
        outline: 1px solid rgba(125, 125, 165, 0.6);
        border-radius: 3px;
      }
      .day-editor .math-invalid {
        color: #b00020;
        border-bottom: 1px dotted #b00020;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.9em;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
