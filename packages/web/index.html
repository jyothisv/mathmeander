<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MathMeander</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        font-family: ui-sans-serif, system-ui, sans-serif;
        max-width: 48rem;
        margin: 2rem auto;
        padding: 0 1rem;
        line-height: 1.5;
      }
      pre {
        white-space: pre-wrap;
        word-break: break-word;
        background: rgba(127, 127, 127, 0.08);
        padding: 0.75rem;
        border-radius: 6px;
      }
      input,
      textarea,
      button {
        font: inherit;
        padding: 0.4rem 0.6rem;
      }
      textarea {
        width: 100%;
        min-height: 12rem;
      }
      nav {
        display: flex;
        gap: 1rem;
        margin-bottom: 1.5rem;
      }
      .meta {
        color: gray;
        font-size: 0.85rem;
      }
      .error {
        color: crimson;
      }
      ul.notes {
        list-style: none;
        padding: 0;
      }
      ul.notes li {
        padding: 0.4rem 0;
        border-bottom: 1px solid rgba(127, 127, 127, 0.2);
      }
      /* The journal-day editor (slice 2c-1). The .ProseMirror node is the contenteditable surface. */
      .day-editor .ProseMirror {
        outline: none;
        min-height: 8rem;
        padding: 0.75rem;
        border: 1px solid rgba(127, 127, 127, 0.25);
        border-radius: 6px;
      }
      .day-editor .ProseMirror p {
        margin: 0 0 0.6rem;
      }
      .day-editor code.math {
        background: rgba(127, 127, 127, 0.12);
        padding: 0 0.2rem;
        border-radius: 3px;
      }
      /* Type cues (slice 2c-2): a typed prose block shows its §6.0 type as a small label, so a stripped
         cue (`Thm.`) is visibly acknowledged. Full styling is the design pass; this is minimal feedback. */
      .day-editor .ProseMirror p[data-unit-type] {
        border-left: 2px solid rgba(127, 127, 127, 0.4);
        padding-left: 0.6rem;
      }
      .day-editor .ProseMirror p[data-unit-type]::before {
        content: attr(data-unit-type);
        display: block;
        font-size: 0.7rem;
        font-weight: 600;
        text-transform: capitalize;
        letter-spacing: 0.03em;
        color: gray;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
