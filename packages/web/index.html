<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MathMeander</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        font-family: ui-sans-serif, system-ui, sans-serif;
        max-width: 48rem;
        margin: 2rem auto;
        padding: 0 1rem;
        line-height: 1.5;
      }
      pre {
        white-space: pre-wrap;
        word-break: break-word;
        background: rgba(127, 127, 127, 0.08);
        padding: 0.75rem;
        border-radius: 6px;
      }
      input,
      textarea,
      button {
        font: inherit;
        padding: 0.4rem 0.6rem;
      }
      textarea {
        width: 100%;
        min-height: 12rem;
      }
      nav {
        display: flex;
        gap: 1rem;
        margin-bottom: 1.5rem;
      }
      .meta {
        color: gray;
        font-size: 0.85rem;
      }
      .error {
        color: crimson;
      }
      ul.notes {
        list-style: none;
        padding: 0;
      }
      ul.notes li {
        padding: 0.4rem 0;
        border-bottom: 1px solid rgba(127, 127, 127, 0.2);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
