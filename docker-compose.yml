# Dev infrastructure (setup decision 2: local Docker first; Neon/R2 at first deploy).
# CI uses this same file for integration/e2e jobs — one pinned source of DB truth.
name: mathmeander

services:
  # PG 18 pinned; minimum supported is PG 15 (NULLS NOT DISTINCT arrives in slice 1).
  postgres:
    image: postgres:18.4-alpine
    environment:
      POSTGRES_USER: mathmeander
      POSTGRES_PASSWORD: mathmeander # dev-only, visibly non-secret
      POSTGRES_DB: mathmeander_dev
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      # postgres:18+ images declare the volume at /var/lib/postgresql (not .../data).
      - pg_data:/var/lib/postgresql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U mathmeander -d mathmeander_dev']
      interval: 2s
      timeout: 3s
      retries: 15

  # S3-compatible stand-in for Cloudflare R2. Runs from day one for infra parity;
  # NO client code consumes it until slice 3 (sources/PDF).
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin # dev-only, visibly non-secret
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-sf', 'http://localhost:9000/minio/health/live']
      interval: 2s
      timeout: 3s
      retries: 15

  # One-shot: create the dev bucket (idempotent). Profiled like dbmate so it is never
  # part of `docker compose up --wait` (a completed container fails the wait); `just up`
  # runs it explicitly via `docker compose run --rm`.
  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    profiles: [tools]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - mc alias set local http://minio:9000 minioadmin minioadmin && mc mb -p local/mathmeander-dev-assets

  # SQL-structure migration tool (plain SQL; see docs/adr/0001). Never auto-started —
  # invoked via `just db-*` (which rewrites localhost → postgres for the container).
  dbmate:
    image: ghcr.io/amacneil/dbmate:2.33.0
    profiles: [tools]
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./db:/db
    environment:
      DBMATE_MIGRATIONS_DIR: /db/migrations
      DBMATE_SCHEMA_FILE: /db/schema.sql

volumes:
  pg_data:
  minio_data:
