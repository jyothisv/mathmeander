# Purity guard for the surface language crate (arch doc §5: no I/O, no clock, no env),
# mirroring crates/core/clippy.toml. Two more independent guards back this up: the wasm32
# CI check and scripts/check-core-deps.sh (both extended to mathmeander-surface).
allow-unwrap-in-tests = true

disallowed-methods = [
    "std::time::SystemTime::now",
    "std::time::Instant::now",
    "std::fs::read",
    "std::fs::read_to_string",
    "std::fs::write",
    "std::fs::File::open",
    "std::fs::File::create",
    "std::env::var",
    "std::env::var_os",
    "std::env::vars",
]
